directive @cacheControl(
    maxAge: Int
    scope: CacheControlScope
) on FIELD_DEFINITION | OBJECT

enum CacheControlScope {
    PUBLIC
    PRIVATE
}

scalar Email

type User @key(fields: "id") {
    id: ID!
    email: Email!
    gender: Gender! @deprecated (reason: "We no longer support this field")
}

enum Gender {
    MALE
    FEMALE
    NON_BINARY
    OTHER
}

input CreateUserInput {
    email: Email!
    gender: Gender!
}

input UpdateUserInput {
    id: ID!
    email: Email
}

type PageInfo {
    endCursor: ID
    hasNextPage: Boolean!
}

type UserConnection {
    users: [User!]!
    pageInfo: PageInfo!
}

type Query {
    user: User
    users: [User] @cacheControl(maxAge: 60, scope: PUBLIC)
    me: User
    paginatedUsers(take: Int!, after: ID): UserConnection!
}

type Mutation {
    createUser(input: CreateUserInput!): User!
    updateUser(input: UpdateUserInput!): User
    deleteUser(id: ID!): Boolean!
}

type Subscription {
    userCreated: User!
}